    <h1 class="campaign-title">لوحة <span class="accent">الإدارة</span></h1>

  <!-- ===== شاشة تسجيل الدخول (تخطيط مستقلّ ومركَّز) ===== -->
  <main class="login-screen" id="login-section">
    <section class="card login-card">
      <div class="login-card__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2>تسجيل الدخول</h2>
      <p class="login-card__hint">صلاحيات مسؤولي الحملة فقط</p>
      <div id="login-alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">البريد الإلكتروني</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            required
            autocomplete="username"
            placeholder="admin@example.com"
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="password">كلمة السر</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            required
            autocomplete="current-password"
          >
        </div>
        <button type="submit" class="submit-button" id="login-btn">دخول</button>
      </form>
    </section>
  </main>

  <!-- ===== شاشة عرض البيانات ===== -->
  <main class="admin-container" id="dashboard-section" style="display: none;">

    <div class="admin-header">
      <h1>الترشيحات الواردة</h1>
      <div class="admin-header__actions">
        <a class="btn-home" href="index.html">الصفحة الرئيسية</a>
        <button class="btn-export" id="export-btn">تصدير كملف إكسل Excel</button>
        <button class="btn-logout" id="logout-btn">تسجيل خروج</button>
      </div>
    </div>

    <!-- إحصائيات سريعة -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- شريط الأدوات: بحث + فلتر + ترتيب -->
    <div class="admin-toolbar" id="admin-toolbar" style="display: none;">
      <label class="toolbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="search-input" placeholder="ابحث بالاسم، الجهة، المسمى الوظيفي…" aria-label="بحث في الترشيحات">
      </label>

      <div class="toolbar-controls">
        <label class="toolbar-select">
          <span>الجهة</span>
          <select id="filter-org" aria-label="فلترة بالجهة">
            <option value="">كل الجهات</option>
          </select>
        </label>

        <label class="toolbar-select">
          <span>الترتيب</span>
          <select id="sort-by" aria-label="ترتيب الترشيحات">
            <option value="newest">الأحدث أولاً</option>
            <option value="oldest">الأقدم أولاً</option>
            <option value="org">حسب الجهة</option>
            <option value="leader">حسب القائد</option>
          </select>
        </label>
      </div>

      <div class="toolbar-meta" aria-live="polite">
        <strong id="result-count">0</strong>
        <span>ترشيح</span>
      </div>
    </div>

    <!-- شبكة البطاقات -->
    <div class="nominations-grid" id="nominations-grid">
      <div class="loading">جاري تحميل البيانات…</div>
    </div>

    <!-- ترقيم الصفحات -->
    <nav class="pagination" id="pagination" aria-label="ترقيم الترشيحات"></nav>

  </main>

  <!-- Drawer (يفتح من اليسار) -->
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer__backdrop" id="drawer-backdrop"></div>
    <div class="drawer__panel" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
      <header class="drawer__header">
        <div class="drawer__head-content">
          <span class="drawer__org-pill" id="drawer-org">—</span>
          <h2 class="drawer__title" id="drawer-title">تفاصيل الترشيح</h2>
          <time class="drawer__date" id="drawer-date"></time>
        </div>
        <button class="drawer__close" id="drawer-close" aria-label="إغلاق التفاصيل">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </header>
      <div class="drawer__body" id="drawer-body"></div>
    </div>
  </aside>

  <footer class="site-footer">
    <div class="footer-line">فريق <span class="team-name">نصنع جونا</span> — الرفاه الوظيفي ٢٠٢٦</div>
    <div class="footer-credit">
      <span>تصميم وبرمجة <span class="credit-name">محمد إسماعيل المطر</span></span>
      <a href="tel:+966554909663" class="credit-phone" aria-label="اتصال بـ محمد إسماعيل المطر على الرقم 0554909663">
        <span class="credit-phone__label">تواصل معي الآن</span>
        <svg class="credit-phone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </a>
    </div>
  </footer>
